version: '3.8'

services:
  # ============================================
  # INFRASTRUCTURE SERVICES (always-on)
  # ============================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: forest-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx256m"
    mem_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - lakehouse
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: forest-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 536870912
      KAFKA_HEAP_OPTS: "-Xmx512m"
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - lakehouse
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: forest-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - lakehouse
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: forest-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/lakehouse --ignore-existing;
      mc mb myminio/checkpoints --ignore-existing;
      echo 'MinIO buckets created successfully';
      "
    networks:
      - lakehouse

  # ============================================
  # APPLICATION SERVICES (on-demand)
  # ============================================

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: forest-app
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - KAFKA_BROKER=kafka:29092
    mem_limit: 1g
    volumes:
      - ./src:/app/src
    networks:
      - lakehouse
    command: echo "Use 'docker compose run --rm app <command>' to execute jobs"

  spark:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: forest-spark
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - KAFKA_BROKER=kafka:29092
      - SPARK_DRIVER_MEMORY=1g
    mem_limit: 2g
    volumes:
      - ./src:/app/src
    networks:
      - lakehouse
    command: echo "Use 'docker compose run --rm spark <command>' to execute Spark jobs"

  sensor-producer:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: forest-sensor-producer
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      - KAFKA_BROKER=kafka:29092
    mem_limit: 256m
    volumes:
      - ./src:/app/src
    networks:
      - lakehouse
    command: python -m src.generators.sensor_producer

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    container_name: forest-dashboard
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    mem_limit: 512m
    volumes:
      - ./dashboard:/app/dashboard
    networks:
      - lakehouse
    command: streamlit run /app/dashboard/app.py --server.port=8501 --server.address=0.0.0.0

volumes:
  minio-data:

networks:
  lakehouse:
    driver: bridge
