x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: docker/airflow/Dockerfile
  volumes:
    - ./dags:/opt/airflow/dags
    - ./src:/app/src
    - airflow-logs:/opt/airflow/logs
  networks:
    - lakehouse

services:
  # ============================================
  # INFRASTRUCTURE SERVICES (always-on)
  # ============================================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    hostname: zookeeper
    container_name: forest-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_HEAP_OPTS: "-Xmx256m"
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "ruok,stat,srvr"
      EXTRA_ARGS: "-Dzookeeper.4lw.commands.whitelist=ruok,stat,srvr"
    mem_limit: 384m
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/commands/srvr > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lakehouse
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    hostname: kafka
    container_name: forest-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_LOG_RETENTION_BYTES: 536870912
      KAFKA_HEAP_OPTS: "-Xmx512m"
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - lakehouse
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    hostname: minio
    container_name: forest-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    mem_limit: 384m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - lakehouse
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    container_name: forest-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/lakehouse --ignore-existing;
      mc mb myminio/checkpoints --ignore-existing;
      echo 'MinIO buckets created successfully';
      "
    networks:
      - lakehouse

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: forest-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: forest-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    mem_limit: 384m
    networks:
      - lakehouse
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: forest-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    mem_limit: 256m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - lakehouse
    restart: unless-stopped

  # ============================================
  # SPARK CLUSTER
  # ============================================

  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: forest-spark-master
    hostname: spark-master
    ports:
      - "8082:8080"
      - "7077:7077"
    environment:
      - SPARK_MODE=master
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    mem_limit: 512m
    volumes:
      - ./src:/app/src
    networks:
      - lakehouse
    command: spark-class org.apache.spark.deploy.master.Master -h spark-master --port 7077 --webui-port 8080
    restart: unless-stopped

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: forest-spark-worker
    hostname: spark-worker
    depends_on:
      - spark-master
    ports:
      - "8081:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=1g
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    mem_limit: 1536m
    volumes:
      - ./src:/app/src
    networks:
      - lakehouse
    command: spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8081
    restart: unless-stopped

  # ============================================
  # APPLICATION SERVICES (on-demand)
  # ============================================

  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: forest-app
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - KAFKA_BROKER=kafka:29092
    mem_limit: 1g
    volumes:
      - ./src:/app/src
    networks:
      - lakehouse
    command: echo "Use 'docker compose run --rm app <command>' to execute jobs"

  spark:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    container_name: forest-spark
    depends_on:
      minio:
        condition: service_healthy
      spark-master:
        condition: service_started
    env_file: .env
    ports:
      - "4040:4040"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - KAFKA_BROKER=kafka:29092
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_DRIVER_MEMORY=1g
    mem_limit: 2g
    volumes:
      - ./src:/app/src
    networks:
      - lakehouse
    command: echo "Use 'docker compose run --rm spark <command>' for ad-hoc Spark jobs"

  sensor-producer:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: forest-sensor-producer
    depends_on:
      kafka:
        condition: service_healthy
    env_file: .env
    environment:
      - KAFKA_BROKER=kafka:29092
    mem_limit: 256m
    volumes:
      - ./src:/app/src
    networks:
      - lakehouse
    command: python -m src.generators.sensor_producer

  dashboard:
    build:
      context: .
      dockerfile: docker/dashboard/Dockerfile
    container_name: forest-dashboard
    depends_on:
      minio:
        condition: service_healthy
    ports:
      - "8501:8501"
    environment:
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    mem_limit: 512m
    volumes:
      - ./dashboard:/app/dashboard
    networks:
      - lakehouse
    command: streamlit run /app/dashboard/app.py --server.port=8501 --server.address=0.0.0.0

  # ============================================
  # AIRFLOW ORCHESTRATION
  # ============================================

  airflow-init:
    <<: *airflow-common
    container_name: forest-airflow-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@forest.local || true
      "

  airflow-webserver:
    <<: *airflow-common
    container_name: forest-airflow-webserver
    hostname: airflow-webserver
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8088:8080"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - AIRFLOW__WEBSERVER__SECRET_KEY=forest-lakehouse-secret
      - AIRFLOW__WEBSERVER__EXPOSE_CONFIG=True
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_DRIVER_HOST=airflow-webserver
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - KAFKA_BROKER=kafka:29092
      - PYTHONPATH=/app
    mem_limit: 512m
    command: airflow webserver --port 8080
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: forest-airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      spark-master:
        condition: service_started
      minio:
        condition: service_healthy
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__FERNET_KEY=ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
      - AIRFLOW__WEBSERVER__SECRET_KEY=forest-lakehouse-secret
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_DRIVER_HOST=airflow-scheduler
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - KAFKA_BROKER=kafka:29092
      - PYTHONPATH=/app
    mem_limit: 1g
    command: airflow scheduler
    restart: unless-stopped

volumes:
  minio-data:
  postgres-data:
  airflow-logs:

networks:
  lakehouse:
    driver: bridge
